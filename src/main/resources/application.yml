server:
  port: 8000
  servlet:
    context-path: /api
  session:
    timeout: 30m
    cookie:
      name: JSESSIONID
      http-only: true
      secure: false # set to false for local testing without HTTPS, but security config will manage cookie rules dynamically

spring:
  datasource:
    url: jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
